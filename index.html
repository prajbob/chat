<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- LOGIN SECTION -->
  <div id="loginSection">
    <h2>Login</h2>
    <form id="loginForm">
      <input id="email" placeholder="Email" required>
      <input id="password" type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
  <!-- CHAT SECTION -->
  <div id="chatSection" style="display:none;">
    <!-- Sidebar: Friend list (owner) or hidden (friends) -->
    <div class="sidebar-wrap">
      <div id="onlineUsers" class="sidebar"></div>
    </div>
    <!-- Main chat area -->
    <div id="chatContainer" class="chat-container">
      <div class="chat-header-row">
        <div id="chatHeader" class="chat-header">Select a conversation</div>
        <div class="header-settings">
          <button class="settings-btn" onclick="toggleSettings(event)" title="Settings"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
          <div id="settingsMenu" class="settings-menu" style="display:none">
            <div class="settings-item" onclick="changeUsername(); toggleSettings()">Username</div>
            <div class="settings-item danger" onclick="logout()">Logout</div>
          </div>
        </div>
      </div>
      <div id="chat" class="chat"></div>
      <div id="typingIndicator" class="typing"></div>
      <div id="replyPreview" class="reply-preview" style="display:none">
        <div id="replyPreviewText" class="reply-preview-text"></div>
        <button class="reply-cancel" onclick="cancelReply()">✕</button>
      </div>
      <div class="input-row">
        <label class="img-label" id="imageBtn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><input type="file" id="imageInput" accept="image/*" onchange="sendImage()" style="display:none"></label>
        <textarea id="message" placeholder="Type a message"></textarea>
        <button class="send-btn" onclick="sendMessage()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>
  </div>
  <!-- Whats New Modal -->
  <div id="whatsNewModal" style="display:none" class="modal-overlay">
    <div class="modal-box whatsnew-box">
      <div class="whatsnew-title">What's new in Chat 2.0 ✦</div>
      <ul class="whatsnew-list">
        <li>Image sharing</li>
        <li>Message replies</li>
        <li>Edit &amp; delete options</li>
        <li>Date separators</li>
        <li>Mobile optimized</li>
      </ul>
      <div class="modal-btns">
        <button class="modal-save" onclick="dismissWhatsNew()">Let's go</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" style="display:none" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">Edit message</div>
      <textarea id="editInput" class="modal-input"></textarea>
      <div class="modal-btns">
        <button onclick="cancelEdit()">Cancel</button>
        <button class="modal-save" onclick="confirmEdit()">Save</button>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>

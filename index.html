<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Modern Firebase Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- LOGIN SECTION -->
  <div id="loginSection">
    <h2>Login</h2>
    <form id="loginForm">
      <input id="email" placeholder="Email" required>
      <input id="password" type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
  <!-- CHAT SECTION -->
  <div id="chatSection" style="display:none;">
    <!-- Sidebar: Friend list (owner) or hidden (friends) -->
    <div id="onlineUsers" class="sidebar"></div>
    <!-- Main chat area -->
    <div id="chatContainer" class="chat-container">
      <div id="chatHeader" class="chat-header">Select a conversation</div>
      <div id="chat" class="chat"></div>
      <div id="typingIndicator" class="typing"></div>
      <textarea id="message" placeholder="Type a message"></textarea>
      <div class="button-row">
        <button onclick="sendMessage()">Send</button>
        <button onclick="changeUsername()">Username</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>

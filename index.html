<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- LOGIN SECTION -->
  <div id="loginSection">
    <h2>Login</h2>
    <form id="loginForm">
      <input id="email" placeholder="Email" required>
      <input id="password" type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
  <!-- CHAT SECTION -->
  <div id="chatSection" style="display:none;">
    <!-- Sidebar: Friend list (owner) or hidden (friends) -->
    <div id="onlineUsers" class="sidebar"></div>
    <!-- Main chat area -->
    <div id="chatContainer" class="chat-container">
      <div id="chatHeader" class="chat-header">Select a conversation</div>
      <div id="chat" class="chat"></div>
      <div id="typingIndicator" class="typing"></div>
      <div id="replyPreview" class="reply-preview" style="display:none">
        <div id="replyPreviewText" class="reply-preview-text"></div>
        <button class="reply-cancel" onclick="cancelReply()">✕</button>
      </div>
      <div class="input-row">
        <textarea id="message" placeholder="Type a message"></textarea>
        <label class="img-label" id="imageBtn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><input type="file" id="imageInput" accept="image/*" onchange="sendImage()" style="display:none"></label>
      </div>
      <div class="button-row">
        <button onclick="sendMessage()">Send</button>
        <button onclick="changeUsername()">Username</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>
  <!-- Whats New Modal -->
  <div id="whatsNewModal" style="display:none" class="modal-overlay">
    <div class="modal-box whatsnew-box">
      <div class="whatsnew-title">What's new in Chat 2.0 ✦</div>
      <ul class="whatsnew-list">
        <li>Image sharing</li>
        <li>Message replies</li>
        <li>Edit &amp; delete options</li>
        <li>Date separators</li>
        <li>Mobile optimized</li>
      </ul>
      <div class="modal-btns">
        <button class="modal-save" onclick="dismissWhatsNew()">Let's go</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" style="display:none" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">Edit message</div>
      <textarea id="editInput" class="modal-input"></textarea>
      <div class="modal-btns">
        <button onclick="cancelEdit()">Cancel</button>
        <button class="modal-save" onclick="confirmEdit()">Save</button>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
